name: Playwright Hybrid Framework CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:

  test:

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Install Dependencies

        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Install Playwright Browsers

        run: |
          playwright install --with-deps


      - name: Create Framework Folders

        run: |
          mkdir -p logs
          mkdir -p screenshots


      - name: Run Automation Suite

        run: |
          pytest \
          --alluredir=allure-results


      - name: Upload Allure Results

        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: allure-results
          path: allure-results/


      - name: Upload Screenshots

        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: screenshots
          path: screenshots/


      - name: Upload Logs

        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: framework-logs
          path: logs/


      - name: Upload Trace Files

        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: traces
          path: |
            trace.zip
            traces/


      - name: Upload Videos

        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: videos
          path: videos/